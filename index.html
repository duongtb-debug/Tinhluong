<!-- KHU VỰC IMPORT FILE CHẤM CÔNG TỪ MÁY CHẤM CÔNG -->
<div class="panel">
  <div class="panel-title">
    <span>⏱️ Nhập Dữ Liệu Từ Máy Chấm Công & Tính Lương Tự Động</span>
    <a id="btnSheetLuong" href="https://docs.google.com/spreadsheets/d/1NxXZtsEFI5-hN1CWiTah64NaT_O5jyBD_EguxxgAHPE/edit" target="_blank" style="background:#0284c7; color:white; padding:5px 12px; border-radius:4px; text-decoration:none; font-weight:bold; font-size:12px;">
      📊 Xem Công Thức Trên Google Sheets
    </a>
  </div>

  <div style="background: #0f172a; border: 1px dashed #38bdf8; padding: 15px; border-radius: 6px; margin-bottom: 15px;">
    <label style="color: #38bdf8; font-weight: bold; display: block; margin-bottom: 8px;">
      📂 Chọn File Dữ Liệu Máy Chấm Công (.csv / .xlsx / .txt):
    </label>
    <input type="file" id="fileChamCong" accept=".csv, .xlsx, .txt" onchange="docFileChamCong(this)">
    <p style="color: #94a3b8; font-size: 11px; margin-top: 5px; margin-bottom: 0;">
      * Hệ thống sẽ tự động bóc tách Ngày Công, áp dụng công thức <b>[Lương NET = (LCB/26 * Công) + Phụ Cấp - BHXH - Thuế]</b> trên Google Sheets.
    </p>
  </div>

  <div class="btn-group">
    <button type="button" class="btn-submit" style="background: #10b981;" onclick="dayDuLieuChamCongUpSheet()">
      ⚡ Tự Động Tính Lương & Cập Nhật Bảng
    </button>
  </div>
</div>

<script>
  var duLieuChamCongParsed = [];

  // Đọc dữ liệu từ File Chấm Công (CSV/Text)
  function docFileChamCong(input) {
    var file = input.files[0];
    if (!file) return;

    var reader = new FileReader();
    reader.onload = function(e) {
      var text = e.target.result;
      var lines = text.split("\n");
      duLieuChamCongParsed = [];

      // Đọc từng dòng từ file máy chấm công
      for (var i = 1; i < lines.length; i++) {
        var cols = lines[i].split(",");
        if (cols.length >= 3) {
          duLieuChamCongParsed.push({
            maNV: cols[0].trim(),
            hoTen: cols[1].trim(),
            ngayCong: parseFloat(cols[2]) || 0, // Số công thực tế từ máy
            luongCB: parseFloat(cols[3]) || 10000000,
            phuCap: parseFloat(cols[4]) || 1000000,
            thueTNCN: parseFloat(cols[5]) || 0
          });
        }
      }
      alert("🎉 Đã đọc thành công " + duLieuChamCongParsed.length + " dòng dữ liệu chấm công!");
    };
    reader.readAsText(file);
  }

  // Gửi sang Apps Script để đẩy vào Sheet có sẵn công thức
  function dayDuLieuChamCongUpSheet() {
    var execUrl = localStorage.getItem('cfg_exec_api') || document.getElementById('cfgApiExecUrl').value.trim();

    if (duLieuChamCongParsed.length === 0) {
      alert("⚠️ Vui lòng chọn file chấm công trước!");
      return;
    }

    fetch(execUrl, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "importChamCong",
        rows: duLieuChamCongParsed
      })
    })
    .then(res => res.json())
    .then(res => {
      if (res.status === "success") {
        alert("🎉 " + res.message);
        location.reload(); // Tải lại để cập nhật bảng lương mới nhất từ Google Sheets
      } else {
        alert("❌ Lỗi: " + res.message);
      }
    })
    .catch(err => alert("Lỗi kết nối: " + err.toString()));
  }
</script>
