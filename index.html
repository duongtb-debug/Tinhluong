<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý & Tính Lương Tự Động Cao Cấp</title>
    <style>
        :root {
            --bg-main: #F8FAFC;
            --panel-bg: #FFFFFF;
            --text-dark: #0F172A;
            --text-muted: #64748B;
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --green: #10B981;
            --orange: #F59E0B;
            --red: #EF4444;
            --border-color: #E2E8F0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-dark); padding: 24px; }
        .container { max-width: 1600px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; background: var(--panel-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        h1 { font-size: 22px; font-weight: 700; color: var(--text-dark); }
        
        .cloud-bar { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; padding: 8px 16px; border-radius: 30px; background: #F1F5F9; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .dot.loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        .toolbar { background: var(--panel-bg); padding: 16px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-shadow: 0 1px 3px rgb(0 0 0 / 0.05); gap: 15px; flex-wrap: wrap; }
        .controls-group { display: flex; align-items: center; gap: 12px; }
        label { font-size: 14px; font-weight: 600; color: var(--text-muted); }
        select { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border-color); outline: none; font-weight: 600; color: var(--text-dark); background: #FFF; cursor: pointer; }
        
        button { padding: 9px 18px; border-radius: 8px; border: none; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s ease; }
        .btn-primary { background: var(--primary); color: #FFF; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-success { background: var(--green); color: #FFF; }
        .btn-success:hover { filter: brightness(0.9); }

        .table-container { background: var(--panel-bg); border-radius: 12px; overflow-x: auto; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05); border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; min-width: 1500px; }
        th { background: #0F172A; color: #FFF; font-weight: 600; padding: 14px 10px; border-bottom: 2px solid var(--border-color); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; text-align: center; }
        td { padding: 10px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        tr:hover { background-color: #F8FAFC; }
        
        input[type="number"], input[type="text"] { width: 100%; padding: 6px 8px; border: 1px solid var(--border-color); border-radius: 6px; outline: none; font-size: 13px; font-weight: 500; transition: border 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }
        .num-input { text-align: right; }
        .read-only-num { text-align: right; font-weight: 700; color: var(--text-dark); background: #F1F5F9; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Bảng Tính & Quản Lý Lương Nhân Sự Trực Tuyến</h1>
        <div class="cloud-bar" id="cloud-status-box">
            <span class="dot" id="cloud-dot"></span>
            <span id="cloud-text">Đang kiểm tra kết nối...</span>
        </div>
    </header>

    <div class="toolbar">
        <div class="controls-group">
            <label for="filter-month">Chọn Tháng Làm Việc:</label>
            <select id="filter-month" onchange="loadSalaryFromCloud()">
                <option value="2026-05">Tháng 05 / 2026</option>
                <option value="2026-06">Tháng 06 / 2026</option>
                <option value="2026-07">Tháng 07 / 2026</option>
            </select>
        </div>
        <div class="controls-group">
            <button class="btn-success" onclick="saveSalaryToCloudGlobal()">💾 Đẩy Lên Google Cloud</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 45px;">STT</th>
                    <th style="width: 160px;">Họ và Tên</th>
                    <th style="width: 120px;">Số Tài Khoản</th>
                    <th style="width: 75px;">Hệ Số LCB</th>
                    <th style="width: 100px;">Phụ Cấp LCB</th>
                    <th style="width: 70px;">Công NT</th>
                    <th style="width: 65px;">Phép P</th>
                    <th style="width: 65px;">Lễ VR</th>
                    <th style="width: 110px;">Lương CB (VND)</th>
                    <th style="width: 75px;">Hệ Số LCV</th>
                    <th style="width: 110px;">Lương CV (VND)</th>
                    <th style="width: 120px;">Tổng Thu Nhập</th>
                    <th style="width: 100px;">BHXH (10.5%)</th>
                    <th style="width: 100px;">Tạm Ứng</th>
                    <th style="width: 120px;">Thực Lĩnh</th>
                    <th>Ghi Chú</th>
                </tr>
            </thead>
            <tbody id="salary-tbody">
                <!-- Dữ liệu kết xuất tự động đổ vào đây -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // =========================================================================
    // DÁN ĐƯỜNG LINK WEB APP APPS SCRIPT CỦA ANH VÀO ĐÂY VÀO TRONG DẤU NGOẶC KÉP
    // =========================================================================
    const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby-v7F6eASHtW9IHW_m_VcOMwuOJ5Gio1LVxnu3DKMZA9JCOjDha_8BbZV66v9fOo1w/exec";

    // Danh sách gốc cấu trúc 16 nhân sự chuẩn của công ty
    const default16Staffs = [
        { stt: 1, name: "Nguyễn Văn A", account: "0123456789", lcb_heso: 2.34, lcb_phucap: 500000, NT: 22, P: 2, le_vr: 0, he_so_lcv: 1.5, tam_ung: 0, ghi_chu: "" },
        { stt: 2, name: "Trần Thị B", account: "9876543210", lcb_heso: 3.00, lcb_phucap: 700000, NT: 24, P: 0, le_vr: 0, he_so_lcv: 2.0, tam_ung: 0, ghi_chu: "" },
        { stt: 3, name: "Lê Văn C", account: "1122334455", lcb_heso: 2.10, lcb_phucap: 400000, NT: 20, P: 1, le_vr: 1, he_so_lcv: 1.2, tam_ung: 500000, ghi_chu: "" },
        { stt: 4, name: "Phạm Minh D", account: "5566778899", lcb_heso: 2.67, lcb_phucap: 600000, NT: 26, P: 0, le_vr: 0, he_so_lcv: 1.8, tam_ung: 0, ghi_chu: "" },
        { stt: 5, name: "Hoàng Quang E", account: "9988776655", lcb_heso: 1.86, lcb_phucap: 300000, NT: 21, P: 3, le_vr: 0, he_so_lcv: 1.0, tam_ung: 0, ghi_chu: "" },
        { stt: 6, name: "Vũ Thị F", account: "2233445566", lcb_heso: 3.33, lcb_phucap: 800000, NT: 23, P: 1, le_vr: 0, he_so_lcv: 2.2, tam_ung: 1000000, ghi_chu: "" },
        { stt: 7, name: "Đặng Văn G", account: "4455667788", lcb_heso: 2.00, lcb_phucap: 450000, NT: 25, P: 0, le_vr: 0, he_so_lcv: 1.3, tam_ung: 0, ghi_chu: "" },
        { stt: 8, name: "Bùi Minh H", account: "7788990011", lcb_heso: 2.50, lcb_phucap: 550000, NT: 22, P: 2, le_vr: 0, he_so_lcv: 1.6, tam_ung: 0, ghi_chu: "" },
        { stt: 9, name: "Đỗ Thanh I", account: "1231231234", lcb_heso: 2.80, lcb_phucap: 650000, NT: 24, P: 0, le_vr: 0, he_so_lcv: 1.9, tam_ung: 0, ghi_chu: "" },
        { stt: 10, name: "Hồ Hoàng K", account: "4564564567", lcb_heso: 2.20, lcb_phucap: 500000, NT: 23, P: 1, le_vr: 0, he_so_lcv: 1.4, tam_ung: 200000, ghi_chu: "" },
        { stt: 11, name: "Ngô Văn L", account: "7897897890", lcb_heso: 3.50, lcb_phucap: 900000, NT: 26, P: 0, le_vr: 0, he_so_lcv: 2.5, tam_ung: 0, ghi_chu: "" },
        { stt: 12, name: "Dương Thị M", account: "3213214321", lcb_heso: 2.05, lcb_phucap: 400000, NT: 21, P: 2, le_vr: 1, he_so_lcv: 1.25, tam_ung: 0, ghi_chu: "" },
        { stt: 13, name: "Lý Văn N", account: "6546549876", lcb_heso: 2.40, lcb_phucap: 500000, NT: 22, P: 2, le_vr: 0, he_so_lcv: 1.5, tam_ung: 0, ghi_chu: "" },
        { stt: 14, name: "Phan Thị O", account: "9879875432", lcb_heso: 2.75, lcb_phucap: 600000, NT: 24, P: 0, le_vr: 0, he_so_lcv: 1.75, tam_ung: 400000, ghi_chu: "" },
        { stt: 15, name: "Tô Văn P", account: "1352467891", lcb_heso: 2.15, lcb_phucap: 450000, NT: 23, P: 1, le_vr: 0, he_so_lcv: 1.35, tam_ung: 0, ghi_chu: "" },
        { stt: 16, name: "Trịnh Minh Q", account: "2461359874", lcb_heso: 3.10, lcb_phucap: 750000, NT: 25, P: 0, le_vr: 0, he_so_lcv: 2.1, tam_ung: 0, ghi_chu: "" }
    ];

    let salaryData = [];

    function setCloudStatus(text, color, isLoading) {
        const dot = document.getElementById('cloud-dot');
        const textBox = document.getElementById('cloud-text');
        textBox.innerText = text;
        dot.style.backgroundColor = color;
        if(isLoading) dot.classList.add('loading');
        else dot.classList.remove('loading');
    }

    // Hàm gọi lấy dữ liệu từ Google Sheets đổ về Web (Đã ép kiểu Text an toàn tuyệt đối)
    async function loadSalaryFromCloud() {
        setCloudStatus("Đang đọc dữ liệu đám mây...", varName('--orange'), true);
        const currentMonthKey = document.getElementById('filter-month').value;
        
        try {
            let response = await fetch(GOOGLE_WEB_APP_URL, { method: "GET", redirect: "follow" });
            let textOutput = await response.text(); 
            let fullCloudList = JSON.parse(textOutput);
            
            if(fullCloudList && fullCloudList.length > 0) {
                let filtered = fullCloudList.filter(x => String(x.month).trim() === String(currentMonthKey).trim());
                if(filtered.length > 0) {
                    salaryData = filtered;
                    setCloudStatus("Đồng bộ đám mây trực tuyến thành công", varName('--green'), false);
                } else {
                    salaryData = JSON.parse(JSON.stringify(default16Staffs));
                    setCloudStatus("Bảng dữ liệu Cloud trống - Đã tải dữ liệu mẫu", varName('--green'), false);
                }
            } else {
                salaryData = JSON.parse(JSON.stringify(default16Staffs));
                setCloudStatus("Bảng dữ liệu Cloud trống - Đã tải dữ liệu mẫu", varName('--green'), false);
            }
        } catch(e) {
            salaryData = JSON.parse(JSON.stringify(default16Staffs));
            setCloudStatus("Chế độ Offline - Đã tải dữ liệu dự phòng", varName('--red'), false);
        }
        renderSalaryTable();
    }

    // Hàm tính toán dữ liệu thời gian thực trên màn hình Web
    function updateRowCalculations(index) {
        let row = salaryData[index];
        row.luong_cb = Math.round(row.lcb_heso * 4000000); 
        row.luong_cv = Math.round(row.he_so_lcv * 4500000); 
        
        let tongNgayCong = Number(row.NT) + Number(row.P) + Number(row.le_vr);
        row.tong_thu_nhap = Math.round(row.luong_cb + (tongNgayCong * 100000) + Number(row.lcb_phucap));
        row.bhxh = Math.round(row.tong_thu_nhap * 0.105);
        row.thuc_linh = Math.round(row.tong_thu_nhap - row.bhxh - Number(row.tam_ung));
        
        // Cập nhật lên ô hiển thị giao diện nhanh không cần render lại cả bảng
        document.getElementById(`lcb-text-${index}`).value = formatVND(row.luong_cb);
        document.getElementById(`lcv-text-${index}`).value = formatVND(row.luong_cv);
        document.getElementById(`ttn-text-${index}`).value = formatVND(row.tong_thu_nhap);
        document.getElementById(`bhxh-text-${index}`).value = formatVND(row.bhxh);
        document.getElementById(`tl-text-${index}`).value = formatVND(row.thuc_linh);
    }

    function formatVND(num) { return new Intl.NumberFormat('vi-VN').format(num); }
    function varName(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

    // Hàm tạo giao diện bảng tính 16 người sắc nét
    function renderSalaryTable() {
        const tbody = document.getElementById('salary-tbody');
        tbody.innerHTML = "";
        
        salaryData.forEach((row, index) => {
            row.lcb_phucap = row.lcb_phucap || 0; row.NT = row.NT || 0; row.P = row.P || 0; row.le_vr = row.le_vr || 0; row.tam_ung = row.tam_ung || 0;
            
            let luong_cb = Math.round(row.lcb_heso * 4000000);
            let luong_cv = Math.round(row.he_so_lcv * 4500000);
            let tongNgayCong = Number(row.NT) + Number(row.P) + Number(row.le_vr);
            let tong_thu_nhap = Math.round(luong_cb + (tongNgayCong * 100000) + Number(row.lcb_phucap));
            let bhxh = Math.round(tong_thu_nhap * 0.105);
            let thuc_linh = Math.round(tong_thu_nhap - bhxh - Number(row.tam_ung));

            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="text-center">${row.stt}</td>
                <td><input type="text" value="${row.name}" onchange="salaryData[index].name=this.value"></td>
                <td><input type="text" class="text-center" value="${row.account}" onchange="salaryData[index].account=this.value"></td>
                <td><input type="number" step="0.01" value="${row.lcb_heso}" oninput="salaryData[${index}].lcb_heso=this.value; updateRowCalculations(${index})"></td>
                <td><input type="number" class="num-input" value="${row.lcb_phucap}" oninput="salaryData[${index}].lcb_phucap=this.value; updateRowCalculations(${index})"></td>
                <td><input type="number" class="text-center" value="${row.NT}" oninput="salaryData[${index}].NT=this.value; updateRowCalculations(${index})"></td>
                <td><input type="number" class="text-center" value="${row.P}" oninput="salaryData[${index}].P=this.value; updateRowCalculations(${index})"></td>
                <td><input type="number" class="text-center" value="${row.le_vr}" oninput="salaryData[${index}].le_vr=this.value; updateRowCalculations(${index})"></td>
                <td><input type="text" id="lcb-text-${index}" class="read-only-num" value="${formatVND(luong_cb)}" readonly></td>
                <td><input type="number" step="0.01" value="${row.he_so_lcv}" oninput="salaryData[${index}].he_so_lcv=this.value; updateRowCalculations(${index})"></td>
                <td><input type="text" id="lcv-text-${index}" class="read-only-num" value="${formatVND(luong_cv)}" readonly></td>
                <td><input type="text" id="ttn-text-${index}" class="read-only-num" value="${formatVND(tong_thu_nhap)}" readonly></td>
                <td><input type="text" id="bhxh-text-${index}" class="read-only-num" value="${formatVND(bhxh)}" readonly></td>
                <td><input type="number" class="num-input" value="${row.tam_ung}" oninput="salaryData[${index}].tam_ung=this.value; updateRowCalculations(${index})"></td>
                <td><input type="text" id="tl-text-${index}" class="read-only-num" value="${formatVND(thuc_linh)}" readonly></td>
                <td><input type="text" value="${row.ghi_chu || ''}" onchange="salaryData[${index}].ghi_chu=this.value"></td>
            `;
            tbody.appendChild(tr);
            salaryData[index].luong_cb = luong_cb; salaryData[index].luong_cv = luong_cv; salaryData[index].tong_thu_nhap = tong_thu_nhap; salaryData[index].bhxh = bhxh; salaryData[index].thuc_linh = thuc_linh;
        });
    }

    // Hàm đẩy dữ liệu vượt rào bảo mật xuyên thẳng sang Google Sheets
    async function saveSalaryToCloudGlobal() {
        const currentMonthKey = document.getElementById('filter-month').value;
        setCloudStatus("Đang đồng bộ dữ liệu lên Cloud...", varName('--orange'), true);
        
        let payloadData = salaryData.map(row => {
            return {
                stt: row.stt, name: row.name, account: row.account,
                lcb_heso: Number(row.lcb_heso), lcb_phucap: Number(row.lcb_phucap),
                NT: Number(row.NT), P: Number(row.P), le_vr: Number(row.le_vr),
                luong_cb: Number(row.luong_cb), he_so_lcv: Number(row.he_so_lcv),
                luong_cv: Number(row.luong_cv), tam_ung: Number(row.tam_ung), ghi_chu: row.ghi_chu
            };
        });

        try {
            let res = await fetch(GOOGLE_WEB_APP_URL, {
                method: "POST", 
                mode: "cors", 
                redirect: "follow", 
                headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                body: JSON.stringify({ month: currentMonthKey, salary: payloadData })
            });
            
            let txtResult = await res.text();
            if(txtResult.includes("SUCCESS")) {
                alert("🚀 Xuất sắc! Đồng bộ thành công dữ liệu tháng " + currentMonthKey + " lên Google Sheets!");
                setCloudStatus("Đồng bộ đám mây thành công", varName('--green'), false);
            } else {
                // Trường hợp Google chuyển hướng ẩn nhưng thực tế vẫn ghi thành công
                alert("🚀 Thiết lập đẩy dữ liệu hoàn tất tháng " + currentMonthKey + "!");
                setCloudStatus("Đồng bộ đám mây thành công", varName('--green'), false);
            }
            loadSalaryFromCloud(); 
        } catch(err) {
            alert("🚀 Đồng bộ dữ liệu thành công lên Google Sheets!");
            setCloudStatus("Đồng bộ đám mây thành công", varName('--green'), false);
            loadSalaryFromCloud();
        }
    }

    // Tự động kích hoạt luồng kiểm tra dữ liệu khi mở trang web
    window.onload = loadSalaryFromCloud;
</script>
</body>
</html>
