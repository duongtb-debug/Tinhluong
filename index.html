<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINAPACO ERM v37.1 - FULL UNLOCKED</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 11px; margin: 0; padding: 0; color: #1e293b; background: #f1f5f9; }
        .navbar { background: #0f172a; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .navbar h1 { margin: 0; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
        
        .container { max-width: 100%; margin: 15px auto; padding: 0 15px; box-sizing: border-box; }
        .card { background: white; border-radius: 6px; border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 15px; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); }
        
        .upload-zone { border: 2px dashed #3b82f6; background: #eff6ff; padding: 20px; text-align: center; border-radius: 6px; cursor: pointer; font-weight: 600; color: #2563eb; font-size: 12px; transition: all 0.2s; }
        .upload-zone:hover { background: #dbeafe; }
        
        /* Menu Tab */
        .tabs { display: flex; gap: 4px; margin-bottom: -1px; overflow-x: auto; margin-top: 15px;}
        .tab-btn { padding: 8px 16px; font-weight: bold; border: 1px solid #e2e8f0; border-bottom: none; border-radius: 4px 4px 0 0; cursor: pointer; background: #f8fafc; color: #64748b; font-size: 11px; white-space: nowrap; }
        .tab-btn.active-lcb { background: #2563eb; color: white; border-color: #2563eb; }
        .tab-btn.active-lcv { background: #ea580c; color: white; border-color: #ea580c; }
        .tab-btn.active-anca { background: #059669; color: white; border-color: #059669; }
        .tab-btn.active-nganhang { background: #7c3aed; color: white; border-color: #7c3aed; }
        
        .table-responsive { background: white; border: 1px solid #e2e8f0; border-radius: 6px; padding: 12px; overflow-x: auto; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; text-align: right; table-layout: auto; }
        th, td { padding: 6px 10px; border: 1px solid #cbd5e1; white-space: nowrap; vertical-align: middle; }
        th { text-align: center; color: white; font-weight: 600; background: #475569; position: sticky; top: 0; }
        tr:nth-child(even) { background: #f8fafc; }
        tr:hover { background: #f1f5f9; }
        
        /* Ô nhập liệu đã mở khóa hoàn toàn (Unlocked) */
        .table-input { width: 60px; padding: 4px 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 11px; text-align: right; font-family: inherit; font-weight: bold; background: #ffffff; }
        .table-input:focus { border-color: #2563eb; outline: none; background: #fffdf0; box-shadow: 0 0 0 2px rgba(37,99,235,0.2); }
        .table-input.he-so { background: #f0fdf4; border-color: #bbf7d0; width: 50px; text-align: center; }
        .table-input.giam-tru { background: #fff5f5; border-color: #feb2b2; width: 85px; color: #dc2626; }
        
        .text-left { text-align: left; }
        .text-center { text-align: center; }
        .font-bold { font-weight: bold; }
        .color-lcb { color: #1d4ed8; font-weight: bold; }
        .color-lcv { color: #c2410c; font-weight: bold; }
        .color-giamtru { color: #dc2626; font-weight: bold; background: #fef2f2; }
        .color-tongcuoi { color: #166534; font-weight: bold; background: #f0fdf4; border: 1px solid #bbf7d0 !important; }
        .btn-export { background: #10b981; color: white; border: none; padding: 6px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: all 0.2s; font-size: 11px; }
        .btn-export:hover { background: #059669; }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>VINAPACO ERM v37.1 - PHIÊN BẢN MỞ KHÓA & TÍNH TỔNG HOÀN TOÀN</h1>
    </div>

    <div class="container">
        <div class="card">
            <h3 style="margin-top:0; font-size: 12px;">ĐỒNG BỘ CHẤM CÔNG VÂN TAY HOẶC CHỈNH SỬA TRỰC TIẾP</h3>
            <div class="upload-zone" onclick="document.getElementById('excel-file-input').click()">
                <span id="upload-status">Kéo thả hoặc Chọn file Excel chấm công gốc để tự động điền nhanh dữ liệu...</span>
                <input type="file" id="excel-file-input" accept=".xlsx, .xls" style="display:none;" onchange="handleFileSelect(event)">
            </div>
        </div>

        <div class="tabs">
            <button onclick="switchTab('lcb')" id="tab-btn-lcb" class="tab-btn active-lcb">1. Phân Hệ Lương Cơ Bản</button>
            <button onclick="switchTab('lcv')" id="tab-btn-lcv" class="tab-btn">2. Phân Hệ Lương Công Việc</button>
            <button onclick="switchTab('anca')" id="tab-btn-anca" class="tab-btn">3. Phụ Cấp Ăn Ca & Độc Hại</button>
            <button onclick="switchTab('nganhang')" id="tab-btn-nganhang" class="tab-btn">4. Tổng Hợp Chi Trả Ngân Hàng</button>
        </div>

        <div class="table-responsive">
            <table id="main-table">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
                <tfoot id="table-foot"></tfoot>
            </table>
        </div>
        <div style="margin-top: 10px; text-align: right;">
            <button onclick="exportCleanExcel()" class="btn-export">Xuất Bảng Lương (.xlsx)</button>
        </div>
    </div>

    <script>
        let activeTab = 'lcb';

        // KHỞI TẠO DỮ LIỆU ĐÃ ĐƯỢC CHUẨN HOÁ KHỚP 100% VỚI ẢNH GIAO DIỆN CHUẨN CỦA BẠN
        const MASTER_STAFF_DIRECTORY = [
            { name: "NGUYỄN MINH NGỌC", heSoCB: 2.19, heSoCV: 5.80, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 5000000, pctt: 0, truUngT4: 0, docHai: 0 },
            { name: "NGUYỄN VĂN NAM", heSoCB: 1.48, heSoCV: 2.24, heSoHT: 1, cong: 19, phep: 3, le: 0, tamUng: 4000000, pctt: 0, truUngT4: 0, docHai: 0 },
            { name: "NGUYỄN THỊ TUYẾT NHUNG", heSoCB: 1.79, heSoCV: 1.74, heSoHT: 1, cong: 20, phep: 2, le: 0, tamUng: 3000000, pctt: 0, truUngT4: 0, docHai: 10 },
            { name: "VŨ THỊ THU", heSoCB: 1.94, heSoCV: 1.86, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 3000000, pctt: 0, truUngT4: 0, docHai: 10 },
            { name: "ĐÀO THỊ LIÊN", heSoCB: 1.79, heSoCV: 1.74, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 4000000, pctt: 0, truUngT4: 0, docHai: 10 },
            { name: "VÕ THỊ THANH TUYỀN", heSoCB: 1.71, heSoCV: 1.74, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 3000000, pctt: 0, truUngT4: 0, docHai: 10 },
            { name: "TRẦN THỊ THANH", heSoCB: 1.67, heSoCV: 1.48, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 4000000, pctt: 0, truUngT4: 0, docHai: 10 },
            { name: "TRẦN ĐỨC CHIẾN", heSoCB: 1.83, heSoCV: 1.66, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 3000000, pctt: 0, truUngT4: 0, docHai: 0 },
            { name: "PHẠM TIẾN LONG", heSoCB: 1.80, heSoCV: 1.62, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 4000000, pctt: 0, truUngT4: 0, docHai: 0 },
            { name: "ĐINH HỮU VINH", heSoCB: 1.83, heSoCV: 1.66, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 3000000, pctt: 0, truUngT4: 0, docHai: 0 },
            { name: "BÙI ĐÌNH ĐIỆP", heSoCB: 1.53, heSoCV: 1.62, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 4000000, pctt: 0, truUngT4: 0, docHai: 0 },
            { name: "HOÀNG MẠNH HÙNG", heSoCB: 1.53, heSoCV: 1.62, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 4000000, pctt: 0, truUngT4: 0, docHai: 0 },
            { name: "MA TRỌNG LUẬN", heSoCB: 1.35, heSoCV: 1.63, heSoHT: 1.1, cong: 22, phep: 0, le: 0, tamUng: 3000000, pctt: 0, truUngT4: 0, docHai: 18 },
            { name: "TRẦN BÌNH DƯƠNG", heSoCB: 1.79, heSoCV: 2.40, heSoHT: 1, cong: 20, phep: 2, le: 0, tamUng: 3000000, pctt: 0, truUngT4: 0, docHai: 18 },
            { name: "ĐẶNG TRẦN TRUNG", heSoCB: 1.53, heSoCV: 1.62, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 3000000, pctt: 0, truUngT4: 0, docHai: 0 },
            { name: "PHẠM HUY CHIẾN", heSoCB: 2.26, heSoCV: 2.40, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 4000000, pctt: 0, truUngT4: 0, docHai: 0 },
            { name: "NGUYỄN ĐỨC CHÍ", heSoCB: 1.53, heSoCV: 1.85, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 0, pctt: 0, truUngT4: 0, docHai: 0 },
            { name: "TRẦN THẠCH DƯƠNG", heSoCB: 1.53, heSoCV: 1.85, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 0, pctt: 0, truUngT4: 0, docHai: 0 },
            { name: "LÊ HỒNG PHƯƠNG", heSoCB: 1.53, heSoCV: 1.85, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 0, pctt: 0, truUngT4: 0, docHai: 0 },
            { name: "KHỔNG VĂN CHƯƠNG", heSoCB: 1.53, heSoCV: 1.85, heSoHT: 1, cong: 22, phep: 0, le: 0, tamUng: 0, pctt: 0, truUngT4: 0, docHai: 0 }
        ];

        const mốc_lương_gốc = 2530000;
        const mốc_tối_thiểu_vùng = 4140000;
        const dongGiaLCV = 2087970;

        window.onload = function() {
            renderTable();
        };

        function switchTab(tabName) {
            activeTab = tabName;
            ['lcb', 'lcv', 'anca', 'nganhang'].forEach(t => {
                const btn = document.getElementById('tab-btn-' + t);
                btn.className = 'tab-btn'; if (t === tabName) btn.classList.add('active-' + t);
            });
            renderTable();
        }

        // MỞ KHÓA HOÀN TOÀN: Hàm cập nhật giá trị động khi người dùng sửa đổi trực tiếp trên bảng
        function updateValue(index, field, value) {
            MASTER_STAFF_DIRECTORY[index][field] = parseFloat(value) || 0;
            renderTable();
        }

        // HÀM TÍNH TOÁN TOÀN DIỆN CHO TỪNG NHÂN SỰ
        function tinhToanToanBoLuong(staff) {
            let nCong = staff.cong; 
            let nPhep = staff.phep; 
            let nLe = staff.le;
            
            // 1. Logic Lương Cơ Bản (LCB)
            let luongKyHD = Math.round(staff.heSoCB * mốc_tối_thiểu_vùng);
            let luongCoBan = Math.round(staff.heSoCB * mốc_lương_gốc);
            let luongThoiGian = Math.round(luongCoBan / 22) * nCong;
            let luongLePhepThucTe = Math.round(luongKyHD / 22) * (nPhep + nLe);
            
            // Tổng tiền LCB nhân với Hệ Số HT
            let tongTienLCB = Math.round((luongThoiGian + luongLePhepThucTe) * staff.heSoHT);
            
            let bhtn = Math.round(luongKyHD * 0.01);
            let bhxh_yt = Math.round(luongKyHD * 0.095);
            let thucLinhLCB = tongTienLCB - bhtn - bhxh_yt;

            // 2. Logic Lương Công Việc (LCV)
            let luongCongViecThang = staff.heSoCV * dongGiaLCV;
            let luongCV_ThucTe = Math.round((luongCongViecThang * nCong) / 22);
            let thucLinhLCV = luongCV_ThucTe - staff.tamUng - staff.pctt - staff.truUngT4;
            
            // 3. Tổng cộng thực nhận cuối cùng (CK Ngân hàng)
            let tongThucNhanNganHang = thucLinhLCB + thucLinhLCV; 

            // Phụ cấp chi ngoài
            let anCa = Math.round(nCong * 5000);
            let boiDuongDocHai = Math.round(staff.docHai * 13000);

            return { luongKyHD, luongCoBan, luongThoiGian, luongLePhepThucTe, tongTienLCB, bhtn, bhxh_yt, thucLinhLCB, luongCV_ThucTe, thucLinhLCV, anCa, boiDuongDocHai, tongThucNhanNganHang };
        }

        function handleFileSelect(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                for(let i=7; i<rows.length; i++) {
                    let row = rows[i]; if(!row || !row[2]) continue;
                    let uName = row[2].toString().trim().toUpperCase();
                    let staff = MASTER_STAFF_DIRECTORY.find(s => s.name === uName);
                    if(staff) {
                        staff.cong = parseFloat(row[34])||0;
                        staff.phep = parseFloat(row[42])||0;
                        staff.le = parseFloat(row[44])||0;
                    }
                }
                renderTable();
                document.getElementById('upload-status').innerText = "Đồng bộ chấm công vân tay thành công!";
            };
            reader.readAsArrayBuffer(file);
        }

        function renderTable() {
            const head = document.getElementById('table-head'); 
            const body = document.getElementById('table-body');
            const foot = document.getElementById('table-foot');
            body.innerHTML = ""; foot.innerHTML = "";
            
            // Khởi tạo các biến tích lũy tổng cộng
            let sum_cong = 0, sum_phep = 0, sum_le = 0;
            let sum_luong_tg = 0, sum_luong_lp = 0, sum_tong_lcb = 0, sum_thuc_linh_lcb = 0;
            let sum_luong_cv_tt = 0, sum_tam_ung = 0, sum_pctt = 0, sum_tru_t4 = 0, sum_thuc_linh_lcv = 0;
            let sum_anca = 0, sum_dochai = 0, sum_tong_ck = 0;

            if (activeTab === 'lcb') {
                head.innerHTML = `<tr>
                    <th>STT</th>
                    <th class="text-left">Họ và Tên Nhân Sự</th>
                    <th style="background:#1d4ed8;">Hệ Số LCB</th>
                    <th>Lương ký HĐLĐ</th>
                    <th>Lương Cơ Bản</th>
                    <th style="background:#2563eb;">Công NT (Sửa)</th>
                    <th style="background:#2563eb;">Phép (Sửa)</th>
                    <th style="background:#2563eb;">Lễ (Sửa)</th>
                    <th>Lương Thời Gian</th>
                    <th>Lương Lễ Phép</th>
                    <th style="background:#1d4ed8;">Hệ Số HT</th>
                    <th>Tổng Tiền LCB</th>
                    <th>BHTN (1%)</th>
                    <th>BHXH+BHYT</th>
                    <th>Thực Lĩnh LCB</th>
                </tr>`;
                
                MASTER_STAFF_DIRECTORY.forEach((s, idx) => {
                    const res = tinhToanToanBoLuong(s);
                    
                    // Cộng dồn tổng cộng
                    sum_cong += s.cong;
                    sum_phep += s.phep;
                    sum_le += s.le;
                    sum_luong_tg += res.luongThoiGian;
                    sum_luong_lp += res.luongLePhepThucTe;
                    sum_tong_lcb += res.tongTienLCB;
                    sum_thuc_linh_lcb += res.thucLinhLCB;

                    body.innerHTML += `
                    <tr>
                        <td>${idx+1}</td>
                        <td class="text-left font-bold">${s.name}</td>
                        <td><input type="number" step="0.01" class="table-input he-so" value="${s.heSoCB}" oninput="updateValue(${idx}, 'heSoCB', this.value)"></td>
                        <td>${res.luongKyHD.toLocaleString()}</td>
                        <td>${res.luongCoBan.toLocaleString()}</td>
                        <td><input type="number" step="0.5" class="table-input" value="${s.cong}" oninput="updateValue(${idx}, 'cong', this.value)"></td>
                        <td><input type="number" step="1" class="table-input" value="${s.phep}" oninput="updateValue(${idx}, 'phep', this.value)"></td>
                        <td><input type="number" step="1" class="table-input" value="${s.le}" oninput="updateValue(${idx}, 'le', this.value)"></td>
                        <td>${res.luongThoiGian.toLocaleString()}</td>
                        <td>${res.luongLePhepThucTe.toLocaleString()}</td>
                        <td><input type="number" step="0.1" class="table-input he-so" value="${s.heSoHT}" oninput="updateValue(${idx}, 'heSoHT', this.value)"></td>
                        <td class="font-bold">${res.tongTienLCB.toLocaleString()}</td>
                        <td class="color-giamtru">-${res.bhtn.toLocaleString()}</td>
                        <td class="color-giamtru">-${res.bhxh_yt.toLocaleString()}</td>
                        <td class="color-lcb font-bold">${res.thucLinhLCB.toLocaleString()}</td>
                    </tr>`;
                });

                foot.innerHTML = `<tr>
                    <td colspan="2" class="font-bold text-center">TỔNG CỘNG HỆ THỐNG</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td class="font-bold">${sum_cong.toFixed(1)}</td>
                    <td class="font-bold">${sum_phep}</td>
                    <td class="font-bold">${sum_le}</td>
                    <td class="font-bold">${sum_luong_tg.toLocaleString()}</td>
                    <td class="font-bold">${sum_luong_lp.toLocaleString()}</td>
                    <td></td>
                    <td class="font-bold">${sum_tong_lcb.toLocaleString()}</td>
                    <td></td>
                    <td></td>
                    <td class="color-lcb font-bold">${sum_thuc_linh_lcb.toLocaleString()}</td>
                </tr>`;

            } else if (activeTab === 'lcv') {
                head.innerHTML = `<tr>
                    <th>STT</th>
                    <th class="text-left">Họ và Tên Nhân Sự</th>
                    <th style="background:#ea580c;">Hệ Số LCV</th>
                    <th>Ngày Công</th>
                    <th>Lương CV Thực Tế</th>
                    <th style="background:#ea580c;">Tạm Ứng Trừ (Sửa)</th>
                    <th style="background:#ea580c;">Quỹ PCTT (Sửa)</th>
                    <th style="background:#ea580c;">Trừ Ứng T4 (Sửa)</th>
                    <th>Thực Lĩnh LCV</th>
                    <th>Tổng Thực Lĩnh (CB+CV)</th>
                </tr>`;

                MASTER_STAFF_DIRECTORY.forEach((s, idx) => {
                    const res = tinhToanToanBoLuong(s);
                    
                    sum_luong_cv_tt += res.luongCV_ThucTe;
                    sum_tam_ung += s.tamUng;
                    sum_pctt += s.pctt;
                    sum_tru_t4 += s.truUngT4;
                    sum_thuc_linh_lcv += res.thucLinhLCV;
                    sum_tong_ck += res.tongThucNhanNganHang;

                    body.innerHTML += `
                    <tr>
                        <td>${idx+1}</td>
                        <td class="text-left font-bold">${s.name}</td>
                        <td><input type="number" step="0.01" class="table-input he-so" value="${s.heSoCV}" oninput="updateValue(${idx}, 'heSoCV', this.value)"></td>
                        <td>${s.cong}</td>
                        <td>${res.luongCV_ThucTe.toLocaleString()}</td>
                        <td><input type="number" step="50000" class="table-input giam-tru" value="${s.tamUng}" oninput="updateValue(${idx}, 'tamUng', this.value)"></td>
                        <td><input type="number" step="10000" class="table-input giam-tru" style="width:70px;" value="${s.pctt}" oninput="updateValue(${idx}, 'pctt', this.value)"></td>
                        <td><input type="number" step="10000" class="table-input giam-tru" style="width:70px;" value="${s.truUngT4}" oninput="updateValue(${idx}, 'truUngT4', this.value)"></td>
                        <td class="color-lcv">${res.thucLinhLCV.toLocaleString()}</td>
                        <td class="color-tongcuoi">${res.tongThucNhanNganHang.toLocaleString()}</td>
                    </tr>`;
                });

                foot.innerHTML = `<tr>
                    <td colspan="2" class="font-bold text-center">TỔNG CỘNG HỆ THỐNG</td>
                    <td></td>
                    <td></td>
                    <td class="font-bold">${sum_luong_cv_tt.toLocaleString()}</td>
                    <td class="font-bold color-giamtru">${sum_tam_ung.toLocaleString()}</td>
                    <td class="font-bold color-giamtru">${sum_pctt.toLocaleString()}</td>
                    <td class="font-bold color-giamtru">${sum_tru_t4.toLocaleString()}</td>
                    <td class="color-lcv font-bold">${sum_thuc_linh_lcv.toLocaleString()}</td>
                    <td class="color-tongcuoi font-bold">${sum_tong_ck.toLocaleString()}</td>
                </tr>`;

            } else if (activeTab === 'anca') {
                head.innerHTML = `<tr>
                    <th>STT</th>
                    <th class="text-left">Họ và Tên Nhân Sự</th>
                    <th>Công Ăn Ca</th>
                    <th>Tiền Ăn Ca (3)</th>
                    <th style="background:#059669; color:white;">Ngày Độc Hại (Sửa)</th>
                    <th>Độc Hại (4)</th>
                    <th>Tổng Cộng Phụ Cấp (Chi Ngoài)</th>
                </tr>`;

                MASTER_STAFF_DIRECTORY.forEach((s, idx) => {
                    const res = tinhToanToanBoLuong(s);
                    sum_anca += res.anCa;
                    sum_dochai += res.boiDuongDocHai;

                    body.innerHTML += `
                    <tr>
                        <td>${idx+1}</td>
                        <td class="text-left font-bold">${s.name}</td>
                        <td>${s.cong}</td>
                        <td>${res.anCa.toLocaleString()}</td>
                        <td><input type="number" step="1" class="table-input" value="${s.docHai}" oninput="updateValue(${idx}, 'docHai', this.value)"></td>
                        <td>${res.boiDuongDocHai.toLocaleString()}</td>
                        <td class="font-bold">${(res.anCa + res.boiDuongDocHai).toLocaleString()}</td>
                    </tr>`;
                });

                foot.innerHTML = `<tr>
                    <td colspan="2" class="font-bold text-center">TỔNG CỘNG HỆ THỐNG</td>
                    <td></td>
                    <td class="font-bold">${sum_anca.toLocaleString()}</td>
                    <td></td>
                    <td class="font-bold">${sum_dochai.toLocaleString()}</td>
                    <td class="font-bold">${(sum_anca + sum_dochai).toLocaleString()}</td>
                </tr>`;

            } else if (activeTab === 'nganhang') {
                head.innerHTML = `<tr>
                    <th>STT</th>
                    <th class="text-left">Họ và Tên Nhân Sự</th>
                    <th>Thực Lĩnh LCB (1)</th>
                    <th>Thực Lĩnh LCV (2)</th>
                    <th>Ăn Ca (Xem)</th>
                    <th>Độc Hại (Xem)</th>
                    <th style="background:#7c3aed;">Thực Nhận Chuyển Khoản Ngân Hàng</th>
                </tr>`;

                MASTER_STAFF_DIRECTORY.forEach((s, idx) => {
                    const res = tinhToanToanBoLuong(s);
                    sum_thuc_linh_lcb += res.thucLinhLCB;
                    sum_thuc_linh_lcv += res.thucLinhLCV;
                    sum_anca += res.anCa;
                    sum_dochai += res.boiDuongDocHai;
                    sum_tong_ck += res.tongThucNhanNganHang;

                    body.innerHTML += `
                    <tr>
                        <td>${idx+1}</td>
                        <td class="text-left font-bold">${s.name}</td>
                        <td class="color-lcb">${res.thucLinhLCB.toLocaleString()}</td>
                        <td class="color-lcv">${res.thucLinhLCV.toLocaleString()}</td>
                        <td>${res.anCa.toLocaleString()}</td>
                        <td>${res.boiDuongDocHai.toLocaleString()}</td>
                        <td class="color-tongcuoi" style="font-size:12px;">${res.tongThucNhanNganHang.toLocaleString()}</td>
                    </tr>`;
                });

                foot.innerHTML = `<tr>
                    <td colspan="2" class="font-bold text-center">TỔNG CỘNG HỆ THỐNG</td>
                    <td class="color-lcb font-bold">${sum_thuc_linh_lcb.toLocaleString()}</td>
                    <td class="color-lcv font-bold">${sum_thuc_linh_lcv.toLocaleString()}</td>
                    <td class="font-bold">${sum_anca.toLocaleString()}</td>
                    <td class="font-bold">${sum_dochai.toLocaleString()}</td>
                    <td class="color-tongcuoi font-bold" style="font-size:13px; background:#f0fdf4 !important;">${sum_tong_ck.toLocaleString()}</td>
                </tr>`;
            }
        }

        function exportCleanExcel() {
            let dataForExcel = [["STT", "Họ và Tên", "Hệ số LCB", "Hệ số LCV", "Công NT", "Phép", "Lễ", "Lương Thời Gian", "Lương Lễ Phép", "Tổng Tiền LCB", "Thực Lĩnh LCB", "Tạm Ứng Trừ", "Thực Lĩnh LCV", "Thực Nhận CK Ngân Hàng"]];
            
            MASTER_STAFF_DIRECTORY.forEach((s, idx) => {
                const res = tinhToanToanBoLuong(s);
                dataForExcel.push([
                    idx + 1, 
                    s.name, 
                    s.heSoCB, 
                    s.heSoCV, 
                    s.cong, 
                    s.phep, 
                    s.le, 
                    res.luongThoiGian, 
                    res.luongLePhepThucTe, 
                    res.tongTienLCB, 
                    res.thucLinhLCB, 
                    s.tamUng, 
                    res.thucLinhLCV, 
                    res.tongThucNhanNganHang
                ]);
            });
            
            const ws = XLSX.utils.aoa_to_sheet(dataForExcel);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Bang_Luong");
            XLSX.writeFile(wb, "Bang_Luong_He_Thong_Vinapaco_v37.1.xlsx");
        }
    </script>
</body>
</html>
