<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Chuẩn Hóa & Tính Tổng File Lương Đa Dụng</title>
    <!-- Tải thư viện xử lý Excel trực tiếp trên Trình duyệt -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h2 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        .upload-box {
            border: 2px dashed #3498db;
            padding: 30px;
            border-radius: 6px;
            cursor: pointer;
            background-color: #fecf2;
            transition: 0.3s;
        }
        .upload-box:hover { background-color: #ebf5fb; }
        input[type="file"] { display: none; }
        .btn {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 12px 25px;
            margin-top: 20px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            display: none;
            transition: 0.2s;
        }
        .btn:hover { background-color: #27ae60; }
        #status { margin-top: 15px; font-weight: bold; color: #e74c3c; }
        .success { color: #27ae60 !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>Xử Lý File Lương Tự Động</h2>
    <p>Áp dụng cho mọi đơn vị. Tự nhận diện cột, sửa lỗi tràn số thập phân và làm tròn chuẩn số học ở hàng Tổng cộng.</p>
    
    <div class="upload-box" onclick="document.getElementById('excel-file').click()">
        <b style="color: #3498db;">Click để chọn hoặc kéo thả file Excel lương vào đây</b>
        <input type="file" id="excel-file" accept=".xlsx, .xls">
    </div>
    
    <div id="status"></div>
    <button class="btn" id="download-btn">Tải File Lương Đã Chuẩn Hóa</button>
</div>

<script>
let processedWorkbook = null;
let currentFileName = "";

// Bản đồ từ khóa thông minh để tự nhận diện cột dù đơn vị khác viết hoa/thường hay viết tắt
const COLUMN_MAPPINGS = {
    'he_so_lcb': ['hệ số lcb', 'he so lcb', 'hs lcb', 'hslcb'],
    'phu_cap': ['phụ cấp', 'phu cap', 'pc', 'phụ cấp lcb'],
    'luong_hdld': ['lương hđlđ', 'luong hdld', 'lương hợp đồng', 'luonghdld', 'lương hđ'],
    'he_so_lcv': ['hệ số lcv', 'he so lcv', 'hs lcv', 'hslcv'],
    'phu_cap_lcv': ['phụ cấp lcv', 'phu cap lcv', 'pc lcv', 'pclcv'],
    'luong_goc': ['lcb gốc', 'lcb goc', 'lương gốc', 'luong goc'],
    'thoi_gian': ['thời gian', 'thoi gian', 'tg'],
    'phep': ['phép', 'phep'],
    'le_vr': ['lễ, vr', 'le, vr', 'le vr', 'lễ vr'],
    'luong_tg': ['lương tg', 'luong tg'],
    'luong_phep': ['lương phép', 'luong phep'],
    'tong_lcb': ['tổng lcb', 'tong lcb'],
    'lcv_goc': ['lcv gốc', 'lcv goc'],
    'ki': ['ki (%)', 'ki', 'kỉ', 'tỷ lệ ki'],
    'lcv_tte': ['lcv t.tế', 'lcv t.te', 'lcv thực tế', 'lcv thuc te']
};

document.getElementById('excel-file').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    currentFileName = file.name;
    const reader = new FileReader();
    document.getElementById('status').innerText = "กำลัง xử lý... Vui lòng đợi trong giây lát.";
    document.getElementById('status').className = "";
    document.getElementById('download-btn').style.display = "none";

    reader.onload = function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            
            // Xử lý sheet đầu tiên của file Excel
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            // Chuyển sheet thành mảng JSON dữ liệu (chấp nhận dòng đầu là tiêu đề)
            let rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            
            if(rawData.length === 0) {
                throw new Error("File excel không có dữ liệu!");
            }

            // 1. Tìm dòng tiêu đề thực sự (Dòng chứa các chữ như 'hệ số', 'phụ cấp' hoặc 'họ tên')
            let headerRowIndex = 0;
            for (let i = 0; i < Math.min(rawData.length, 5); i++) {
                let rowStr = rawData[i].join(" ").toLowerCase();
                if (rowStr.includes("hệ số") || rowStr.includes("lương") || rowStr.includes("phụ cấp") || rowStr.includes("tên")) {
                    headerRowIndex = i;
                    break;
                }
            }

            let headers = rawData[headerRowIndex].map(h => String(h || "").trim());
            let dataRows = rawData.slice(headerRowIndex + 1);

            // 2. Loại bỏ dòng "Tổng cộng" cũ ở cuối nếu có để tránh tính trùng
            if (dataRows.length > 0) {
                let lastRowFirstCell = String(dataRows[dataRows.length - 1][0] || "").toLowerCase();
                if (lastRowFirstCell.includes("tổng") || lastRowFirstCell.includes("tong")) {
                    dataRows.pop();
                }
            }

            // 3. Tạo dòng Tổng cộng mới rỗng hoàn toàn theo số lượng cột ban đầu
            let totalRow = new Array(headers.length).fill("");
            totalRow[0] = "Tổng cộng"; // Gán nhãn chữ ở cột đầu tiên

            // 4. Duyệt qua từng cột để kiểm tra xem nó thuộc loại dữ liệu nào dựa vào Bản đồ từ khóa
            for (let colIndex = 0; colIndex < headers.length; colIndex++) {
                let headerLower = headers[colIndex].toLowerCase();
                let matchedKey = null;

                // Xác định xem cột hiện tại khớp với từ khóa nào
                for (let key in COLUMN_MAPPINGS) {
                    if (COLUMN_MAPPINGS[key].some(kw => headerLower.includes(kw))) {
                        matchedKey = key;
                        break;
                    }
                }

                // Nếu cột khớp từ khóa cần tính tổng, tiến hành gom dữ liệu và tính toán
                if (matchedKey) {
                    let sum = 0;
                    let hasValidNumber = false;

                    for (let rowIndex = 0; rowIndex < dataRows.length; rowIndex++) {
                        let cellValue = dataRows[rowIndex][colIndex];
                        // Loại bỏ dấu phân tách hàng nghìn nếu định dạng text (ví dụ "22.563.000" hoặc "22,563,000")
                        if (typeof cellValue === 'string') {
                            cellValue = cellValue.replace(/\./g, '').replace(/,/g, '');
                        }
                        let num = parseFloat(cellValue);
                        if (!isNaN(num)) {
                            sum += num;
                            hasValidNumber = true;
                            // Cập nhật lại giá trị số sạch vào mảng để xuất ra không bị lỗi chuỗi text
                            dataRows[rowIndex][colIndex] = num;
                        } else {
                            dataRows[rowIndex][colIndex] = 0; // Để trống hoặc 0 nếu không phải số
                        }
                    }

                    if (hasValidNumber) {
                        // 5. Xử lý GỌN GÀNG SỐ HỌC (Làm tròn chuẩn số học)
                        if (matchedKey.includes('he_so') || matchedKey === 'ki') {
                            // Đối với các cột Hệ Số hoặc Ki (%), làm tròn tối đa 3 chữ số thập phân (Triệt tiêu đuôi .00000003)
                            totalRow[colIndex] = Math.round(sum * 1000) / 1000;
                        } else {
                            // Đối với tiền lương, ngày công, làm tròn thành số nguyên tuyệt đối
                            totalRow[colIndex] = Math.round(sum);
                        }
                    }
                }
            }

            // Đóng gói lại dữ liệu bao gồm: Tiêu đề + Các hàng nhân viên + Hàng tổng cộng mới
            let finalData = [headers, ...dataRows, totalRow];
            
            // Tạo một Sheet mới từ dữ liệu sạch
            let newWorksheet = XLSX.utils.aoa_to_sheet(finalData);
            
            // Lưu lại vào Workbook để sẵn sàng tải xuống
            processedWorkbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(processedWorkbook, newWorksheet, firstSheetName);

            document.getElementById('status').innerText = "✓ Xử lý file thành công! Bạn có thể tải file về ngay.";
            document.getElementById('status').className = "success";
            document.getElementById('download-btn').style.display = "inline-block";

        } catch (error) {
            console.error(error);
            document.getElementById('status').innerText = "❌ Lỗi: Không thể xử lý file lương này. Vui lòng kiểm tra lại cấu trúc file.";
        }
    };

    reader.readAsArrayBuffer(file);
});

// Sự kiện tải file về máy khi bấm nút
document.getElementById('download-btn').addEventListener('click', function() {
    if (!processedWorkbook) return;
    let outputName = "Chuan_Hoa_" + currentFileName;
    XLSX.writeFile(processedWorkbook, outputName);
});
</script>

</body>
</html>
